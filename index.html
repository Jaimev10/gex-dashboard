<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Heatmap Tool — Dealer Gamma Positioning</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0d12;
    --bg-elev: #11151b;
    --bg-tile: #161b22;
    --line: rgba(255,255,255,0.06);
    --line-strong: rgba(255,255,255,0.12);
    --ink: #e8ebee;
    --ink-dim: #8b94a0;
    --ink-faint: #555e6b;
    --green: #4ade80;
    --green-glow: rgba(74,222,128,0.25);
    --red: #f87171;
    --red-glow: rgba(248,113,113,0.25);
    --purple: #a78bfa;
    --purple-glow: rgba(167,139,250,0.25);
    --radius: 14px;
    --radius-sm: 8px;
    --font-display: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: "Geist Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--font-display);
    font-size: 13px; line-height: 1.45;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(1400px 700px at 90% -10%, rgba(74,222,128,0.04), transparent 55%),
      radial-gradient(1100px 500px at -10% 110%, rgba(167,139,250,0.03), transparent 55%);
  }
  .wrap { max-width: 1480px; margin: 0 auto; padding: 22px 32px 80px; }

  /* ─── Top nav ─────────────────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .nav-left { display: flex; align-items: center; gap: 28px; }
  .brand {
    font-weight: 600; font-size: 15px; color: var(--ink);
    letter-spacing: -0.005em;
  }
  .tabs { display: flex; gap: 4px; }
  .tab {
    background: transparent; border: 1px solid transparent;
    color: var(--ink-dim);
    font: inherit; font-size: 13px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all .15s;
    letter-spacing: -0.005em;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--bg-tile);
    border-color: var(--line-strong);
    color: var(--ink);
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .live-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--green);
    color: var(--green); font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(74,222,128,0.05);
  }
  .live-pill.dim { border-color: var(--line-strong); color: var(--ink-dim); background: transparent; }
  .live-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
  }
  .live-pill.dim .dot { box-shadow: none; }
  .clock {
    font-family: var(--font-mono);
    color: var(--ink-dim); font-size: 12px; font-variant-numeric: tabular-nums;
  }
  .icon-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line-strong); background: transparent;
    color: var(--ink); font: inherit; font-size: 12.5px;
    cursor: pointer; transition: all .15s;
  }
  .icon-btn:hover { border-color: rgba(255,255,255,0.22); background: var(--bg-tile); }
  .icon-btn:disabled { opacity: .45; cursor: not-allowed; }
  .icon-btn svg { width: 13px; height: 13px; }

  /* ─── API key bar ─────────────────────────────────────────────────────── */
  .key-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; margin-bottom: 22px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }
  .key-bar.compact { padding: 6px 12px; }
  .key-bar label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-dim); white-space: nowrap;
  }
  .key-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--ink); font: inherit; font-family: var(--font-mono);
    padding: 4px 0;
  }
  .key-bar input::placeholder { color: var(--ink-faint); }
  .key-bar .saved-ind {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--green); font-size: 11px;
  }
  .key-bar .saved-ind .check {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(74,222,128,0.15); color: var(--green);
    display: inline-flex; align-items: center; justify-content: center; font-size: 9px;
  }
  .key-bar a {
    color: var(--ink-dim); text-decoration: none; font-size: 11px;
    border-bottom: 1px dotted var(--ink-faint);
  }

  /* ─── Status ──────────────────────────────────────────────────────────── */
  .status {
    border-radius: var(--radius-sm); padding: 12px 16px;
    margin-bottom: 18px; font-size: 12.5px;
    border: 1px solid; display: none;
  }
  .status.show { display: block; }
  .status.err {
    background: rgba(248,113,113,0.06);
    border-color: rgba(248,113,113,0.25);
    color: #fca5a5;
  }

  /* ─── Ticker cards ────────────────────────────────────────────────────── */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 32px; }

  /* ─── Tracking Panel ────────────────────────────────────────────────── */
  .tracking-panel {
    background: var(--bg-tile);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 32px;
    max-height: 200px;
    display: flex;
    flex-direction: column;
  }
  .tracking-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 10px;
  }
  .tracking-log {
    font-size: 11px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .alert-item {
    padding: 8px 10px;
    border-left: 3px solid;
    background: rgba(255,255,255,0.02);
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .alert-item.bullish {
    border-left-color: var(--green);
    background: rgba(74,222,128,0.06);
  }
  .alert-item.bearish {
    border-left-color: var(--red);
    background: rgba(248,113,113,0.06);
  }
  .alert-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .alert-item.bullish .alert-badge {
    background: var(--green);
    color: #000;
  }
  .alert-item.bearish .alert-badge {
    background: var(--red);
    color: #fff;
  }
  .alert-text {
    flex: 1;
    color: var(--ink-dim);
  }
  .alert-time {
    font-size: 10px;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    overflow: hidden;
  }
  .card:hover { border-color: var(--line-strong); }
  .card.active {
    border-color: rgba(74,222,128,0.3);
  }
  .card.active::before {
    content: ''; position: absolute; top: 0; left: 18px; right: 18px;
    height: 2px; background: var(--green);
    border-radius: 0 0 2px 2px;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-ticker {
    font-family: var(--font-display);
    font-weight: 600; font-size: 28px; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .pin {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    border: 1px solid currentColor;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(255,255,255,0.02);
  }
  .pin .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .pin.bull { color: var(--green); }
  .pin.bear { color: var(--red); }
  .pin.neutral { color: var(--ink-dim); }

  .card-meta {
    font-size: 11.5px; color: var(--ink-faint);
    font-family: var(--font-mono);
    margin-bottom: 22px;
  }
  .card-label {
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 10px;
  }
  .card-bignum {
    font-family: var(--font-display);
    font-weight: 600; font-size: 38px; letter-spacing: -0.025em;
    color: var(--ink); line-height: 1;
    margin-bottom: 22px;
    font-variant-numeric: tabular-nums;
  }
  .card-bignum.skel { color: var(--ink-faint); }
  .card-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .stat-tile {
    background: var(--bg-tile);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 11px 13px;
  }
  .stat-tile .stl {
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 5px;
    font-family: var(--font-mono); font-weight: 500;
  }
  .stat-tile .stv {
    font-family: var(--font-mono);
    font-weight: 600; font-size: 17px;
    color: var(--ink); letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .stat-tile.call .stv { color: var(--green); }
  .stat-tile.put .stv { color: var(--red); }

  /* ─── Section header ──────────────────────────────────────────────────── */
  .section-head {
    display: flex; align-items: end; justify-content: space-between;
    margin-bottom: 14px; gap: 16px; flex-wrap: wrap;
  }
  .section-title {
    font-size: 16px; font-weight: 600; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .section-sub {
    font-size: 12px; color: var(--ink-dim);
    margin-top: 3px;
  }
  .section-controls {
    display: flex; align-items: center; gap: 18px;
  }
  .legend { display: flex; gap: 14px; }
  .legend span {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--ink-dim);
  }
  .legend span::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
  }
  .legend .pos::before { background: var(--green); }
  .legend .neg::before { background: var(--red); }
  .legend .dom::before { background: var(--purple); }

  .toggle-group {
    display: inline-flex; background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 3px;
  }
  .toggle-btn {
    background: transparent; border: none; color: var(--ink-dim);
    font: inherit; font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 5px;
    cursor: pointer; transition: all .15s;
    font-family: var(--font-mono); letter-spacing: 0.02em;
  }
  .toggle-btn:hover { color: var(--ink); }
  .toggle-btn.active { background: var(--bg-tile); color: var(--ink); }

  /* ─── Table ───────────────────────────────────────────────────────────── */
  .chain-wrap {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .chain-table { width: 100%; border-collapse: collapse; }
  .chain-table thead th {
    text-align: left;
    font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-dim); font-weight: 500;
    padding: 14px 18px; background: rgba(255,255,255,0.015);
    border-bottom: 1px solid var(--line);
    font-family: var(--font-mono);
  }
  .chain-table thead th.num { text-align: right; }
  .chain-table thead th.bar { width: 220px; text-align: right; }
  .chain-table tbody tr {
    border-bottom: 1px solid var(--line);
    transition: background .12s;
  }
  .chain-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .chain-table tbody tr:last-child { border-bottom: none; }
  .chain-table tbody td {
    padding: 13px 18px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .chain-table tbody td.strike {
    font-weight: 600; color: var(--ink);
  }
  .chain-table tbody td.num { text-align: right; color: var(--ink-dim); }
  .chain-table tbody td.gex { text-align: right; font-weight: 600; }
  .chain-table tbody td.gex.pos { color: var(--green); }
  .chain-table tbody td.gex.neg { color: var(--red); }
  .chain-table tbody td.gex.dom { color: var(--purple); }
  .chain-table tbody tr.dominant {
    background: rgba(167,139,250,0.04);
  }
  .chain-table tbody tr.dominant td.strike { color: var(--purple); }

  /* ─── Ultimate Ladder ────────────────────────────────────────────────── */
  .ladder-controls {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
    padding: 14px 16px;
    background: var(--bg-tile);
    border: 1px solid var(--line);
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: none;
  }
  .ladder-ticker-toggle, .ladder-zoom-toggle {
    display: flex; align-items: center; gap: 4px;
  }
  .ld-zoom-label {
    font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-dim); margin-right: 6px; font-weight: 500;
  }
  .ld-tk-btn, .ld-zoom-btn {
    background: var(--bg-elev);
    border: 1px solid var(--line-strong);
    color: var(--ink-dim);
    padding: 7px 14px;
    font: inherit; font-size: 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .ld-tk-btn:hover, .ld-zoom-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--ink);
  }
  .ld-tk-btn.active, .ld-zoom-btn.active {
    background: var(--ink);
    color: #000;
    border-color: var(--ink);
    font-weight: 600;
  }
  .ld-zoom-btn { padding: 6px 10px; font-size: 11px; }

  .key-levels-banner {
    background: var(--bg-tile);
    border: 1px solid var(--line);
    border-bottom: none;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 14px;
  }
  .kl-loading {
    grid-column: 1/-1;
    text-align: center; padding: 12px;
    color: var(--ink-dim); font-size: 12px;
  }
  .kl-item {
    display: flex; flex-direction: column; gap: 4px;
  }
  .kl-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 500;
  }
  .kl-value {
    font-family: var(--font-mono);
    font-size: 16px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .kl-value.spot { color: var(--ink); }
  .kl-value.cw { color: #fbbf24; }
  .kl-value.pw { color: var(--purple); }
  .kl-value.flip { color: #f59e0b; }
  .kl-value.pos { color: var(--green); }
  .kl-value.neg { color: var(--red); }
  .kl-sub {
    font-size: 11px; color: var(--ink-dim);
    font-family: var(--font-mono);
  }

  .ladder-main {
    background: var(--bg-tile);
    border: 1px solid var(--line);
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 0;
    overflow: hidden;
    max-height: 75vh;
    overflow-y: auto;
  }
  .ladder-empty-main {
    text-align: center; padding: 60px 20px;
    color: var(--ink-dim);
  }

  /* New strike row design */
  .strike-row {
    display: grid;
    grid-template-columns: 80px 1fr 100px 50px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    position: relative;
    cursor: pointer;
    transition: background .12s;
    gap: 12px;
    min-height: 42px;
  }
  .strike-row:hover {
    background: rgba(255,255,255,0.03);
  }
  .strike-row:last-child { border-bottom: none; }

  .sr-strike {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .sr-bar-area {
    position: relative;
    height: 24px;
    display: flex;
    align-items: center;
  }
  .sr-bar-line {
    position: absolute;
    top: 50%; left: 50%;
    width: 1px; height: 100%;
    background: rgba(255,255,255,0.08);
  }
  .sr-bar {
    position: absolute;
    height: 14px;
    border-radius: 2px;
    transition: all .2s ease;
    top: 50%;
    transform: translateY(-50%);
  }
  .sr-bar.pos {
    background: linear-gradient(90deg, rgba(74,222,128,0.4), rgba(74,222,128,0.7));
    left: 50%;
  }
  .sr-bar.neg {
    background: linear-gradient(90deg, rgba(248,113,113,0.7), rgba(248,113,113,0.4));
    right: 50%;
  }
  .sr-value {
    font-family: var(--font-mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .sr-value.pos { color: #86efac; }
  .sr-value.neg { color: #fca5a5; }
  .sr-distance {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-faint);
    text-align: right;
  }

  /* Special row types */
  .strike-row.spot {
    background: rgba(255,255,255,0.06);
    border-top: 2px solid #fff;
    border-bottom: 2px solid #fff;
  }
  .strike-row.spot .sr-strike {
    background: #fff;
    color: #000;
    padding: 3px 8px;
    border-radius: 3px;
    display: inline-block;
    font-weight: 700;
  }
  .strike-row.call-wall {
    background: rgba(251,191,36,0.08);
  }
  .strike-row.call-wall .sr-strike {
    color: #fbbf24;
  }
  .strike-row.call-wall::before {
    content: "CW";
    position: absolute;
    left: 4px; top: 50%; transform: translateY(-50%);
    font-size: 8px; color: #fbbf24;
    background: rgba(251,191,36,0.15);
    padding: 2px 4px; border-radius: 2px;
    font-weight: 700;
  }
  .strike-row.put-wall {
    background: rgba(167,139,250,0.08);
  }
  .strike-row.put-wall .sr-strike {
    color: var(--purple);
  }
  .strike-row.put-wall::before {
    content: "PW";
    position: absolute;
    left: 4px; top: 50%; transform: translateY(-50%);
    font-size: 8px; color: var(--purple);
    background: rgba(167,139,250,0.15);
    padding: 2px 4px; border-radius: 2px;
    font-weight: 700;
  }
  .strike-row.gamma-flip {
    background: rgba(245,158,11,0.05);
    border-top: 1px dashed #f59e0b;
    border-bottom: 1px dashed #f59e0b;
  }
  .strike-row.gamma-flip .sr-strike {
    color: #f59e0b;
  }
  .strike-row.king {
    background: rgba(74,222,128,0.06);
  }
  .strike-row.king .sr-strike::after {
    content: " 👑";
    font-size: 12px;
  }
  
  .sr-badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-left: 4px;
  }
  .sr-badge.gain {
    background: rgba(74,222,128,0.18);
    color: #86efac;
  }
  .sr-badge.loss {
    background: rgba(248,113,113,0.18);
    color: #fca5a5;
  }

  .ladder-legend {
    display: flex; flex-wrap: wrap; gap: 16px;
    padding: 14px 16px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .ladder-legend span {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ladder-legend span::before {
    content: "";
    width: 10px; height: 10px;
    border-radius: 2px;
  }
  .lad-spot::before { background: #fff; }
  .lad-cw::before { background: #fbbf24; }
  .lad-pw::before { background: var(--purple); }
  .lad-flip::before { background: #f59e0b; }
  .lad-king::before { background: var(--green); }
  .lad-pos::before { background: rgba(74,222,128,0.6); }
  .lad-neg::before { background: rgba(248,113,113,0.6); }

  /* Strike Modal */
  .strike-modal {
    position: fixed; inset: 0;
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .strike-modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);

  .bar-fill.neg { background: var(--red); right: 50%; }

  .bar-wrap::before {
    content: ''; position: absolute; left: 50%; top: -2px; bottom: -2px;

  /* ─── View switching ──────────────────────────────────────────────────── */

  /* ─── Ladder ──────────────────────────────────────────────────────────── */
  .legend .lad-spot::before { background: #fff; }

  .ladder-grid {

          <span class="king-arrow" data-king-arrow>0.0%</span>
        </div>
        <div class="lcol-rows" data-rows>
          <div class="lcol-empty">Loading...</div>
        </div>
      </div>
    </div>
  </section>
  <!-- /Ladder -->

  <!-- Strike Detail Modal -->
  <div class="strike-modal" id="strikeModal" style="display:none">
    <div class="strike-modal-backdrop" id="strikeModalBackdrop"></div>
    <div class="strike-modal-content">
      <div class="strike-modal-head">
        <div>
          <div class="sm-ticker" id="smTicker">—</div>
          <div class="sm-strike" id="smStrike">—</div>
        </div>
        <button class="sm-close" id="smClose">×</button>
      </div>
      <div class="strike-modal-body" id="smBody">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <footer>
    <div>Data: FlashAlpha Lab · 15s cache · ETF/index endpoints require Basic+ plan</div>
    <div>Not investment advice.</div>
  </footer>
</div>

<script>
(() => {
  const TICKERS = ["SPX", "SPY", "QQQ"];
  const state = {
    data: { SPX: null, SPY: null, QQQ: null },
    refreshing: false,
    expiration: "all",
  };

  const $ = (id) => document.getElementById(id);

  // ────────────────────────────────────────────────────────── expiration helpers
  const getExpirationDate = (offset) => {
    const d = new Date();
    // Match patterns like "0dte", "1dte", ... "5dte"
    const match = offset.match(/^(\d)dte$/);
    if (match) {
      const days = parseInt(match[1], 10);
      // Skip weekends — count business days
      let added = 0;
      while (added < days) {
        d.setDate(d.getDate() + 1);
        const day = d.getDay();
        if (day !== 0 && day !== 6) added++; // Skip Sunday(0) and Saturday(6)
      }
      return d.toISOString().split("T")[0];
    }
    return null;
  };

  const getExpirationParam = () => {
    if (state.expiration === "all") return "all";
    return getExpirationDate(state.expiration) || "all";
  };

  // ────────────────────────────────────────────────────────── helpers
  const fmtMoney = (n, opts = {}) => {
    if (n == null || isNaN(n)) return "—";
    const sign = n < 0 ? "-" : opts.signed ? "+" : "";
    const a = Math.abs(n);
    if (a >= 1e9) return sign + "$" + (a / 1e9).toFixed(2) + "B";
    if (a >= 1e6) return sign + "$" + (a / 1e6).toFixed(opts.precise ? 1 : 0) + "M";
    if (a >= 1e3) return sign + "$" + (a / 1e3).toFixed(1) + "K";
    return sign + "$" + a.toFixed(0);
  };
  const fmtGexK = (n) => {
    if (n == null || isNaN(n)) return "—";
    const sign = n < 0 ? "-" : "+";
    const k = Math.abs(n) / 1000;
    return sign + Math.round(k).toLocaleString();
  };
  const fmtNum = (n) => (n == null || isNaN(n)) ? "—" : Number(n).toLocaleString();
  const fmtStrike = (s, tk) => tk === "SPX" ? Math.round(s).toLocaleString() : (Number.isInteger(s) ? String(s) : s.toFixed(1));

  const setStatus = (msg) => {
    const el = $("status");
    if (!msg) { el.classList.remove("show"); return; }
    el.textContent = msg;
    el.classList.add("show");
  };

  const setLive = (live) => {
    const pill = $("livePill");
    const txt = $("liveText");
    if (live) {
      pill.classList.remove("dim");
      txt.textContent = "LIVE";
    } else {
      pill.classList.add("dim");
      txt.textContent = state.refreshing ? "FETCHING" : "IDLE";
    }
  };

  const updateClock = () => {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    $("clock").textContent = pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  };
  setInterval(updateClock, 1000); updateClock();

  // ────────────────────────────────────────────────────────── data fetch
  async function refreshAll() {
    setStatus("");
    state.refreshing = true;
    setLive(false);
    $("refreshBtn").disabled = true;

    const results = await Promise.allSettled(TICKERS.map((tk) => loadOne(tk)));
    const errs = [];
    let anyOk = false;
    results.forEach((r, i) => {
      if (r.status === "rejected") errs.push(TICKERS[i] + ": " + r.reason.message);
      else anyOk = true;
    });
    state.refreshing = false;
    setLive(anyOk);
    $("refreshBtn").disabled = false;
    if (errs.length) setStatus(errs.join("   ·   "));
  }

  async function loadOne(tk) {
    // Call our Vercel proxy
    const params = new URLSearchParams({ ticker: tk, metric: "gex", expiration: getExpirationParam() });
    const url = `/api/gex?${params.toString()}`;
    let resp;
    try {
      resp = await fetch(url);
    } catch (e) {
      throw new Error("network — " + e.message);
    }
    if (!resp.ok) {
      let detail = resp.statusText;
      try { const j = await resp.json(); detail = j.detail || j.message || j.error || detail; } catch (_) {}
      if (resp.status === 401 || resp.status === 403) throw new Error("auth (check API key in Vercel)");
      if (resp.status === 429) throw new Error("rate-limited");
      throw new Error(detail || ("HTTP " + resp.status));
    }
    const data = await resp.json();
    state.data[tk] = data;
    renderLadder(tk);
  }

  // ────────────────────────────────────────────────────────── ULTIMATE LADDER
  const ladderState = {
    zoom: 10, // default to ±10% around spot
  };

  // Render a single column with the new design
  function renderColumn(tk) {
    const col = document.querySelector(`.lcol[data-tk="${tk}"]`);
    if (!col) return;
    const d = state.data[tk];
    const rowsEl = col.querySelector("[data-rows]");
    const pxEl = col.querySelector("[data-px]");
    const chgEl = col.querySelector("[data-chg]");
    const kingArrowEl = col.querySelector("[data-king-arrow]");

    if (!d || !d.strikes || !d.strikes.length) {
      rowsEl.innerHTML = '<div class="lcol-empty">No data — hit Refresh.</div>';
      return;
    }

    const getGex = (s) => s.net_gex ?? s.gex ?? 0;
    const getOiChange = (s) => (s.call_oi_change || 0) + (s.put_oi_change || 0);

    const spot = d.underlying_price ?? d.spot ?? null;
    pxEl.textContent = spot != null
      ? "$" + Number(spot).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : "—";

    const chgPct = d.day_change_pct ?? d.change_pct ?? null;
    if (chgPct != null) {
      chgEl.className = "lcol-chg " + (chgPct >= 0 ? "up" : "down");
      chgEl.textContent = Math.abs(chgPct).toFixed(2) + "%";
    } else {
      chgEl.textContent = "";
    }

    // King arrow shows the dominant strike change
    if (kingArrowEl) {
      kingArrowEl.className = "king-arrow " + (chgPct >= 0 ? "up" : "down");
      kingArrowEl.textContent = chgPct != null ? Math.abs(chgPct).toFixed(1) + "%" : "0.0%";
    }

    // Filter strikes by zoom range
    let strikes = [...d.strikes];
    if (spot != null && ladderState.zoom < 100) {
      const lowBound = spot * (1 - ladderState.zoom / 100);
      const highBound = spot * (1 + ladderState.zoom / 100);
      strikes = strikes.filter((s) => s.strike >= lowBound && s.strike <= highBound);
    }
    // Sort descending (high to low)
    strikes.sort((a, b) => b.strike - a.strike);

    if (strikes.length === 0) {
      rowsEl.innerHTML = '<div class="lcol-empty">No strikes in zoom range.</div>';
      return;
    }

    const callWall = d.call_wall?.strike;
    const putWall = d.put_wall?.strike;
    const spotStrike = spot != null
      ? strikes.reduce((a, b) => Math.abs(b.strike - spot) < Math.abs(a.strike - spot) ? b : a, strikes[0]).strike
      : null;

    const maxAbs = Math.max(...strikes.map((s) => Math.abs(getGex(s)))) || 1;

    // Get top 25% threshold for OI change badges
    const oiChanges = strikes.map((s) => Math.abs(getOiChange(s))).sort((a, b) => b - a);
    const badgeThresh = oiChanges[Math.floor(oiChanges.length * 0.25)] || Infinity;

    // Color function — solid background based on ticker base color and GEX
    const tickerHue = { SPX: 175, SPY: 145, QQQ: 270 }[tk] || 200;
    const cellColor = (g) => {
      const mag = Math.min(1, Math.abs(g) / maxAbs);
      const hue = g >= 0 ? tickerHue : 350;
      const sat = g >= 0 ? (35 + mag * 25) : (60 + mag * 20);
      const light = g >= 0 ? (28 + mag * 10) : (25 + mag * 8);
      return `hsl(${hue}, ${sat}%, ${light}%)`;
    };

    let spotRowEl = null;
    rowsEl.innerHTML = "";
    const frag = document.createDocumentFragment();

    strikes.forEach((s) => {
      const g = getGex(s);
      const row = document.createElement("div");
      row.className = "lrow";
      row.dataset.strike = s.strike;

      const isSpot = s.strike === spotStrike;
      const isCw = s.strike === callWall;
      const isPw = s.strike === putWall;

      if (isCw) row.classList.add("call-wall");
      else if (isPw) row.classList.add("put-wall");
      else row.style.backgroundColor = cellColor(g);
      
      if (isSpot) row.classList.add("spot");

      // Strike
      const k = document.createElement("div");
      k.className = "lr-strike";
      k.textContent = fmtStrike(s.strike, tk);
      row.appendChild(k);

      // Badge (OI change) - middle slot
      const badgeEl = document.createElement("div");
      const oc = getOiChange(s);
      if (Math.abs(oc) >= badgeThresh && Math.abs(oc) > 100) {
        badgeEl.className = "lr-badge " + (oc >= 0 ? "pos" : "neg");
        const pct = Math.round(Math.min(99, Math.abs(oc) / 1000));
        badgeEl.textContent = (oc >= 0 ? "+" : "-") + pct + (pct >= 10 ? "" : "%");
      }
      row.appendChild(badgeEl);

      // Value
      const v = document.createElement("div");
      v.className = "lr-value";
      const sign = g >= 0 ? "$+" : "$-";
      v.textContent = sign + Math.round(Math.abs(g) / 1000).toLocaleString() + "K";
      row.appendChild(v);

      if (isSpot) spotRowEl = row;
      frag.appendChild(row);
    });

    rowsEl.appendChild(frag);

    // Auto-scroll to spot
    if (spotRowEl) {
      requestAnimationFrame(() => {
        const target = spotRowEl.offsetTop - (rowsEl.clientHeight / 2) + (spotRowEl.clientHeight / 2);
        rowsEl.scrollTop = Math.max(0, target);
      });
    }

    // Click-to-expand
    rowsEl.querySelectorAll(".lrow").forEach((row) => {
      row.addEventListener("click", () => {
        const strikeVal = parseFloat(row.dataset.strike);
        const strikeData = strikes.find((s) => s.strike === strikeVal);
        if (strikeData) showStrikeDetail(tk, strikeData, d);
      });
    });
  }

  function showStrikeDetail(tk, strike, fullData) {
    $("smTicker").textContent = tk;
    $("smStrike").textContent = fmtStrike(strike.strike, tk);

    const callGex = strike.call_gex || 0;
    const putGex = strike.put_gex || 0;
    const netGex = strike.net_gex || 0;
    const callOi = strike.call_oi || 0;
    const putOi = strike.put_oi || 0;
    const callVol = strike.call_volume || 0;
    const putVol = strike.put_volume || 0;
    const callOiChange = strike.call_oi_change || 0;
    const putOiChange = strike.put_oi_change || 0;

    const spot = fullData.underlying_price ?? fullData.spot ?? null;
    const dist = spot ? ((strike.strike - spot) / spot * 100).toFixed(2) + "%" : "—";
    const moneyness = spot ? (strike.strike > spot ? "OTM Call / ITM Put" : strike.strike < spot ? "ITM Call / OTM Put" : "ATM") : "—";

    $("smBody").innerHTML = `
      <div class="sm-section">
        <div class="sm-section-title">Position vs Spot</div>
        <div class="sm-row">
          <span class="sm-label">Distance from spot</span>
          <span class="sm-value ${spot && strike.strike >= spot ? "pos" : "neg"}">${dist}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Moneyness</span>
          <span class="sm-value">${moneyness}</span>
        </div>
      </div>
      <div class="sm-section">
        <div class="sm-section-title">Gamma Exposure</div>
        <div class="sm-row">
          <span class="sm-label">Net GEX</span>
          <span class="sm-value ${netGex >= 0 ? "pos" : "neg"}">${(netGex >= 0 ? "+" : "")}${fmtMoney(netGex)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Call GEX</span>
          <span class="sm-value pos">+${fmtMoney(callGex)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Put GEX</span>
          <span class="sm-value neg">${putGex >= 0 ? "+" : ""}${fmtMoney(putGex)}</span>
        </div>
      </div>
      <div class="sm-section">
        <div class="sm-section-title">Open Interest</div>
        <div class="sm-row">
          <span class="sm-label">Call OI</span>
          <span class="sm-value">${fmtNum(callOi)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Put OI</span>
          <span class="sm-value">${fmtNum(putOi)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Put/Call Ratio</span>
          <span class="sm-value">${callOi > 0 ? (putOi / callOi).toFixed(2) : "—"}</span>
        </div>
      </div>
      <div class="sm-section">
        <div class="sm-section-title">Today's Volume</div>
        <div class="sm-row">
          <span class="sm-label">Call Volume</span>
          <span class="sm-value">${fmtNum(callVol)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Put Volume</span>
          <span class="sm-value">${fmtNum(putVol)}</span>
        </div>
        <div class="sm-row">
          <span class="sm-label">Total Volume</span>
          <span class="sm-value">${fmtNum(callVol + putVol)}</span>
        </div>
      </div>
    `;

    $("strikeModal").style.display = "flex";
  }

  function renderLadder(tk) {
    renderColumn(tk);
  }

  function renderAllLadders() {
    TICKERS.forEach((tk) => renderColumn(tk));
  }

  // ────────────────────────────────────────────────────────── wire it up

  // Ticker dropdown selectors — change column ticker
  document.querySelectorAll(".lcol-ticker").forEach((sel) => {
    sel.addEventListener("change", (e) => {
      const newTk = e.target.value;
      const col = e.target.closest(".lcol");
      const oldTk = col.dataset.tk;
      // Update column data-tk
      col.dataset.tk = newTk;
      // Re-render this column
      renderColumn(newTk);
    });
  });

  // Strike modal close
  $("smClose").addEventListener("click", () => { $("strikeModal").style.display = "none"; });
  $("strikeModalBackdrop").addEventListener("click", () => { $("strikeModal").style.display = "none"; });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") $("strikeModal").style.display = "none";
  });

  $("refreshBtn").addEventListener("click", refreshAll);
  
  $("expirationFilter").addEventListener("change", (e) => {
    state.expiration = e.target.value;
    refreshAll();
  });

  // Auto-load data on page load
  refreshAll();
})();
</script>
</body>
</html>
